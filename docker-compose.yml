version: '3.8'

services:
  # --- Custom Benchmarking Suite ---
  backend:
    build:
      context: ./backend
    container_name: benchmark-backend
    ports:
      - "8080:8080"
    environment:
      # Native internal docker networking routed directly to official tigergraph container
      - GRAPHRAG_SERVICE_URL=http://graphrag:8000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - graphrag

  frontend:
    build:
      context: ./frontend
    container_name: benchmark-frontend
    ports:
      - "3001:3000"
    environment:
      # Instruct frontend proxy to route back internal calls on container runtime
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

  # --- Official TigerGraph GraphRAG Stack (Merged from ./graphrag) ---
  graphrag:
    image: tigergraph/graphrag:latest 
    platform: linux/amd64
    container_name: graphrag
    build:
      context: ./graphrag
      dockerfile: graphrag/Dockerfile
    ports:
      - 8000:8000
    depends_on:
      - graphrag-ecc
      - chat-history
    environment:
      SERVER_CONFIG: "/code/configs/server_config.json"
      LOGLEVEL: "INFO"
      USE_CYPHER: "true"
    volumes:
      - ./graphrag/configs:/code/configs

  graphrag-ecc:
    image: tigergraph/graphrag-ecc:latest
    platform: linux/amd64
    container_name: graphrag-ecc
    build:
      context: ./graphrag
      dockerfile: ecc/Dockerfile
    ports:
      - 8001:8001
    environment:
      SERVER_CONFIG: "/code/configs/server_config.json"
      LOGLEVEL: "INFO"
      INIT_EMBED_STORE: "false"
    volumes:
      - ./graphrag/configs:/code/configs

  chat-history:
    image: tigergraph/chat-history:latest
    platform: linux/amd64
    container_name: chat-history
    build:
      context: ./graphrag/chat-history
      dockerfile: Dockerfile
    ports:
      - 8002:8002
    environment:
      CONFIG_FILES: "/configs/server_config.json"
      LOGLEVEL: "INFO"
    volumes:
      - ./graphrag/configs:/configs

  graphrag-ui:
    image: tigergraph/graphrag-ui:latest 
    platform: linux/amd64
    container_name: graphrag-ui 
    build:
      context: ./graphrag/graphrag-ui
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    depends_on:
      - graphrag

  nginx:
    container_name: nginx
    image: nginx
    volumes:
      - ./graphrag/docs/tutorials/configs/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - graphrag-ui
      - graphrag
